# Deepfake Detection & Enterprise AI Trust Platform
# SaaS Core System Configuration

stripe:
  publishable_key: "pk_test_mock_deepfake_trust_platform_key"
  secret_key: "sk_test_mock_deepfake_trust_platform_key"
  webhook_secret: "whsec_mock_secret"
  use_mock: true

plans:
  free:
    name: "Developer Free Tier"
    stripe_price_id: "price_free_tier"
    daily_quota: 10
    monthly_quota: 300
    concurrent_request_limit: 1
    compute_queue: "cpu_low_priority"
    gpu_fraction: 0.0
    allowed_features:
      - "image_detection"
      - "basic_audit"
    price_cents: 0
    billing_interval: "month"

  pro:
    name: "Professional Forensics"
    stripe_price_id: "price_pro_tier"
    daily_quota: 200
    monthly_quota: 5000
    concurrent_request_limit: 5
    compute_queue: "gpu_shared"
    gpu_fraction: 0.25
    allowed_features:
      - "image_detection"
      - "video_detection"
      - "audio_detection"
      - "explainable_ai"
      - "webcam_verification"
      - "standard_audit"
      - "slack_alerts"
    price_cents: 19900
    billing_interval: "month"

  enterprise:
    name: "Enterprise Sovereignty"
    stripe_price_id: "price_enterprise_tier"
    daily_quota: 1000000 # Virtually unlimited standard quota
    monthly_quota: 10000000
    concurrent_request_limit: 100
    compute_queue: "dedicated_ray_worker"
    gpu_fraction: 1.0
    allowed_features:
      - "image_detection"
      - "video_detection"
      - "audio_detection"
      - "explainable_ai"
      - "webcam_verification"
      - "advanced_forensic_agents"
      - "threat_intelligence"
      - "isolated_schema_routing"
      - "compliance_reporting"
      - "webhook_engine"
      - "slack_alerts"
      - "discord_alerts"
      - "sso_auth"
      - "unlimited_audit_trail"
    price_cents: 150000 # Base enterprise monthly minimum
    billing_interval: "month"
    metered_overage_price_cents: 2 # 2 cents per extra check above baseline
