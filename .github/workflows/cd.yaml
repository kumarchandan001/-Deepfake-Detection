name: DeepGuard AI — CD Pipeline

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CLUSTER_NAME: deepguard-prod
  CLUSTER_REGION: us-east1
  NAMESPACE: deepguard-ai

permissions:
  contents: read
  id-token: write
  packages: read
  deployments: write

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Stage 1: Determine Deployment Target
  # ─────────────────────────────────────────────────────────────────────
  prepare:
    name: "📋 Prepare Deployment"
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.target }}
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "target=production" >> $GITHUB_OUTPUT
          else
            echo "target=staging" >> $GITHUB_OUTPUT
          fi

      - name: Determine image tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────────────────────────────
  # Stage 2: Deploy to Staging
  # ─────────────────────────────────────────────────────────────────────
  deploy-staging:
    name: "🚀 Deploy to Staging"
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.deepguard.ai
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GKE
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: deepguard-staging
          location: ${{ env.CLUSTER_REGION }}

      - name: Deploy to staging
        run: |
          export IMAGE_TAG=${{ needs.prepare.outputs.image_tag }}

          # Apply namespace and configs
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml

          # Update deployment image
          kubectl set image deployment/deepguard-api \
            deepguard-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} \
            -n ${{ env.NAMESPACE }}

          kubectl set image deployment/deepguard-gpu-worker \
            gpu-inference-worker=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:${IMAGE_TAG} \
            -n ${{ env.NAMESPACE }}

          # Apply remaining resources
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/redis-deployment.yaml

          # Wait for rollout
          kubectl rollout status deployment/deepguard-api \
            -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Staging smoke tests
        run: |
          STAGING_URL="https://staging-api.deepguard.ai"

          # Health check
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/health")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed: HTTP $STATUS"
            exit 1
          fi
          echo "✅ Health check passed"

          # GraphQL endpoint
          GRAPHQL_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${STAGING_URL}/api/v1/graphql" \
            -H "Content-Type: application/json" \
            -H "X-Tenant-ID: smoke_test" \
            -d '{"operation":"query","name":"platformMetrics","variables":{}}')
          if [ "$GRAPHQL_STATUS" != "200" ]; then
            echo "❌ GraphQL check failed: HTTP $GRAPHQL_STATUS"
            exit 1
          fi
          echo "✅ GraphQL endpoint verified"

          # Detection API
          DET_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${STAGING_URL}/api/v1/detect" -X OPTIONS)
          echo "Detection API options: HTTP $DET_STATUS"

  # ─────────────────────────────────────────────────────────────────────
  # Stage 3: Deploy to Production
  # ─────────────────────────────────────────────────────────────────────
  deploy-production:
    name: "🏭 Deploy to Production"
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.environment == 'production'
    environment:
      name: production
      url: https://api.deepguard.ai
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GKE
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.CLUSTER_REGION }}

      - name: Pre-deploy snapshot
        run: |
          echo "=== Current deployment state ==="
          kubectl get deployments -n ${{ env.NAMESPACE }} -o wide
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide

          # Record current revision for rollback
          CURRENT_REV=$(kubectl get deployment deepguard-api \
            -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.metadata.annotations.deployment\.kubernetes\.io/revision}' 2>/dev/null || echo "0")
          echo "ROLLBACK_REVISION=${CURRENT_REV}" >> $GITHUB_ENV

      - name: Canary deployment (10%)
        run: |
          export IMAGE_TAG=${{ needs.prepare.outputs.image_tag }}

          # Apply all K8s manifests
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/hpa.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/redis-deployment.yaml
          kubectl apply -f k8s/gpu-worker-deployment.yaml

          # Update API image
          kubectl set image deployment/deepguard-api \
            deepguard-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} \
            -n ${{ env.NAMESPACE }}

          # Update GPU worker image
          kubectl set image deployment/deepguard-gpu-worker \
            gpu-inference-worker=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker:${IMAGE_TAG} \
            -n ${{ env.NAMESPACE }}

          # Monitor rollout
          kubectl rollout status deployment/deepguard-api \
            -n ${{ env.NAMESPACE }} --timeout=600s

          kubectl rollout status deployment/deepguard-gpu-worker \
            -n ${{ env.NAMESPACE }} --timeout=600s

      - name: Production verification
        run: |
          PROD_URL="https://api.deepguard.ai"
          FAILURES=0

          # Health check
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${PROD_URL}/health" --max-time 10)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check $i/5 passed"
            else
              echo "⚠️ Health check $i/5 failed: HTTP $STATUS"
              FAILURES=$((FAILURES + 1))
            fi
            sleep 5
          done

          if [ $FAILURES -gt 2 ]; then
            echo "❌ Production verification failed ($FAILURES/5 health checks failed)"
            echo "Rolling back to revision ${ROLLBACK_REVISION}..."
            kubectl rollout undo deployment/deepguard-api -n ${{ env.NAMESPACE }}
            exit 1
          fi

          echo "✅ Production deployment verified"

      - name: Tag release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "🎉 Production release ${{ needs.prepare.outputs.image_tag }} deployed successfully"

  # ─────────────────────────────────────────────────────────────────────
  # Stage 4: Post-Deployment
  # ─────────────────────────────────────────────────────────────────────
  post-deploy:
    name: "📊 Post-Deployment"
    runs-on: ubuntu-latest
    needs: [prepare, deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🛡️ DeepGuard AI deployed to ${{ needs.prepare.outputs.environment }}\nVersion: ${{ needs.prepare.outputs.image_tag }}\nStatus: ✅ Success"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Create deployment record
        run: |
          echo "=== Deployment Record ==="
          echo "Environment: ${{ needs.prepare.outputs.environment }}"
          echo "Image Tag: ${{ needs.prepare.outputs.image_tag }}"
          echo "Triggered By: ${{ github.actor }}"
          echo "Commit: ${{ github.sha }}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
