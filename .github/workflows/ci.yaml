name: DeepGuard AI — CI Pipeline

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # Stage 1: Lint & Static Analysis
  # ─────────────────────────────────────────────────────────────────────
  lint:
    name: "🔍 Lint & Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 mypy bandit safety black isort
          pip install -r requirements.txt

      - name: Black formatter check
        run: black --check --diff .

      - name: isort import order check
        run: isort --check-only --diff .

      - name: Flake8 lint
        run: flake8 . --count --max-line-length=120 --statistics --exclude=venv,__pycache__,.git

      - name: MyPy type checking
        run: mypy backend/ ai_engine/ enterprise/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

      - name: Bandit security scan
        run: bandit -r backend/ ai_engine/ enterprise/ -f json -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ─────────────────────────────────────────────────────────────────────
  # Stage 2: Unit & Integration Tests
  # ─────────────────────────────────────────────────────────────────────
  test:
    name: "🧪 Tests (${{ matrix.test-suite }})"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        test-suite:
          - test_api
          - test_auth
          - test_inference
          - test_preprocessing
          - test_video_processing
          - test_audio_models
          - test_temporal_models
          - test_realtime_pipeline
          - test_adversarial_defense
          - test_advanced_forensics
          - test_agents
          - test_intelligence_engine
          - test_distributed_inference
          - test_saas_platform
          - test_graphql_engine
          - test_infrastructure
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run test suite
        env:
          PYTHONPATH: ${{ github.workspace }}
          APP_ENV: test
        run: |
          python -m pytest tests/${{ matrix.test-suite }}.py \
            -v --tb=short \
            --junitxml=test-results/${{ matrix.test-suite }}.xml \
            --cov=backend --cov=ai_engine --cov=enterprise \
            --cov-report=xml:coverage-${{ matrix.test-suite }}.xml \
            || python -m unittest tests/${{ matrix.test-suite }}.py -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.test-suite }}
          path: test-results/

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.test-suite }}
          path: coverage-*.xml

  # ─────────────────────────────────────────────────────────────────────
  # Stage 3: Security Scanning
  # ─────────────────────────────────────────────────────────────────────
  security:
    name: "🛡️ Security Scan"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install safety pip-audit

      - name: Safety dependency check
        run: safety check --full-report || true

      - name: pip-audit vulnerability scan
        run: pip-audit -r requirements.txt --format json --output pip-audit-report.json || true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ─────────────────────────────────────────────────────────────────────
  # Stage 4: Container Build
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: "🏗️ Build Container Images"
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

  # ─────────────────────────────────────────────────────────────────────
  # Stage 5: Quality Gate
  # ─────────────────────────────────────────────────────────────────────
  quality-gate:
    name: "✅ Quality Gate"
    runs-on: ubuntu-latest
    needs: [test, security, build]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Build: ${{ needs.build.result }}"

          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "❌ Tests failed - blocking merge"
            exit 1
          fi

          echo "✅ All quality gates passed"
