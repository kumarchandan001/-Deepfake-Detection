apiVersion: v1
kind: Namespace
metadata:
  name: deepguard-ai
  labels:
    app.kubernetes.io/name: deepguard-ai
    app.kubernetes.io/part-of: deepfake-detection-platform
    environment: production
  annotations:
    description: "AI Deepfake Detection & Enterprise Trust Platform - Production Namespace"
    team: "ai-security"
    cost-center: "cybersecurity-ai"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: deepguard-resource-quota
  namespace: deepguard-ai
spec:
  hard:
    requests.cpu: "32"
    requests.memory: "64Gi"
    limits.cpu: "64"
    limits.memory: "128Gi"
    requests.nvidia.com/gpu: "8"
    pods: "100"
    services: "20"
    persistentvolumeclaims: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: deepguard-limit-range
  namespace: deepguard-ai
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "8"
        memory: "32Gi"
        nvidia.com/gpu: "1"
    - type: Pod
      max:
        cpu: "16"
        memory: "64Gi"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deepguard-default-deny
  namespace: deepguard-ai
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: deepguard-ai
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: deepguard-ai
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
