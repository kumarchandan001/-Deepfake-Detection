apiVersion: v1
kind: Secret
metadata:
  name: deepguard-secrets
  namespace: deepguard-ai
  labels:
    app.kubernetes.io/name: deepguard-api
    app.kubernetes.io/component: secrets
  annotations:
    description: "Sensitive credentials - rotate via sealed-secrets or external-secrets-operator"
type: Opaque
stringData:
  # ─── Database Credentials ─────────────────────────────────────────
  DB_USERNAME: "deepguard_admin"
  DB_PASSWORD: "REPLACE_WITH_VAULT_SECRET"
  DATABASE_URL: "postgresql+asyncpg://deepguard_admin:REPLACE_WITH_VAULT_SECRET@deepguard-postgres-svc:5432/deepguard_platform"

  # ─── Redis Authentication ─────────────────────────────────────────
  REDIS_PASSWORD: "REPLACE_WITH_VAULT_SECRET"
  REDIS_URL: "redis://:REPLACE_WITH_VAULT_SECRET@deepguard-redis-svc:6379/0"

  # ─── JWT / Auth Secrets ────────────────────────────────────────────
  JWT_SECRET_KEY: "REPLACE_WITH_256_BIT_RANDOM_SECRET"
  API_MASTER_KEY: "REPLACE_WITH_SECURE_API_KEY"

  # ─── Stripe Integration ───────────────────────────────────────────
  STRIPE_SECRET_KEY: "sk_live_REPLACE_WITH_STRIPE_SECRET"
  STRIPE_WEBHOOK_SECRET: "whsec_REPLACE_WITH_WEBHOOK_SECRET"
  STRIPE_PUBLISHABLE_KEY: "pk_live_REPLACE_WITH_PUBLISHABLE_KEY"

  # ─── Object Storage Credentials ────────────────────────────────────
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_AWS_KEY"
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_AWS_SECRET"

  # ─── Email / SMTP ─────────────────────────────────────────────────
  SMTP_HOST: "smtp.sendgrid.net"
  SMTP_PORT: "587"
  SMTP_USERNAME: "apikey"
  SMTP_PASSWORD: "REPLACE_WITH_SENDGRID_API_KEY"
  ALERT_FROM_EMAIL: "alerts@deepguard.ai"

  # ─── Slack / Discord Integration ───────────────────────────────────
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/REPLACE"
  DISCORD_WEBHOOK_URL: "https://discord.com/api/webhooks/REPLACE"

  # ─── Encryption Keys ──────────────────────────────────────────────
  EVIDENCE_ENCRYPTION_KEY: "REPLACE_WITH_AES_256_KEY"
  AUDIT_SIGNING_KEY: "REPLACE_WITH_ED25519_PRIVATE_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: deepguard-registry-creds
  namespace: deepguard-ai
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: "REPLACE_WITH_BASE64_DOCKER_CONFIG"
