apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: deepguard-ingress
  namespace: deepguard-ai
  labels:
    app.kubernetes.io/name: deepguard-api
    app.kubernetes.io/component: ingress
  annotations:
    # ─── TLS & Certificate ──────────────────────────────────────────
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    cert-manager.io/acme-challenge-type: "http01"

    # ─── NGINX Ingress Controller ────────────────────────────────────
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"

    # ─── WebSocket Support ───────────────────────────────────────────
    nginx.ingress.kubernetes.io/websocket-services: "deepguard-api-svc"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";

    # ─── Rate Limiting ───────────────────────────────────────────────
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"

    # ─── Security Headers ────────────────────────────────────────────
    nginx.ingress.kubernetes.io/server-snippet: |
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' wss://api.deepguard.ai" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── CORS ────────────────────────────────────────────────────────
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://dashboard.deepguard.ai,https://admin.deepguard.ai"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-Tenant-ID, X-Request-ID"
    nginx.ingress.kubernetes.io/cors-max-age: "86400"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.deepguard.ai
        - dashboard.deepguard.ai
        - ws.deepguard.ai
      secretName: deepguard-tls-cert
  rules:
    - host: api.deepguard.ai
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: deepguard-api-svc
                port:
                  number: 80
          - path: /health
            pathType: Exact
            backend:
              service:
                name: deepguard-api-svc
                port:
                  number: 80
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: deepguard-api-svc
                port:
                  number: 9090
    - host: ws.deepguard.ai
      http:
        paths:
          - path: /api/v1/graphql/ws
            pathType: Prefix
            backend:
              service:
                name: deepguard-api-svc
                port:
                  number: 8001
    - host: dashboard.deepguard.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deepguard-dashboard-svc
                port:
                  number: 3000
